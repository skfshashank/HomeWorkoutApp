<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#050816">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>OpenFit Local</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css?v=18">
  <link rel="stylesheet" href="css/components.css?v=18">
  <link rel="stylesheet" href="css/animations.css?v=18">
  <script>
    // Force clear stale service workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.update(); });
      });
    }
    // Global error handler - shows errors on screen for debugging
    window.onerror = function(msg, src, line) {
      var el = document.getElementById('error-banner');
      if (!el) { el = document.createElement('div'); el.id = 'error-banner'; el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:8px;font-size:12px;max-height:120px;overflow:auto;'; document.body.appendChild(el); }
      el.innerHTML += '<div>' + msg + ' (' + src.split('/').pop() + ':' + line + ')</div>';
    };
    window.onunhandledrejection = function(e) {
      var el = document.getElementById('error-banner');
      if (!el) { el = document.createElement('div'); el.id = 'error-banner'; el.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:red;color:white;padding:8px;font-size:12px;max-height:120px;overflow:auto;'; document.body.appendChild(el); }
      el.innerHTML += '<div>Promise: ' + (e.reason?.message || e.reason || 'unknown') + '</div>';
    };
  </script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div id="app">
    <div class="onboarding" id="onboarding">
      <div class="onb-content" id="onb-content"></div>
      <div class="onb-footer" id="onb-footer"></div>
    </div>

    <main id="main-content" role="main" tabindex="-1">
      <h1 class="sr-only">OpenFit Local - Home Fitness</h1>
      <div data-page="dashboard" class="active"></div>
      <div data-page="workouts"></div>
      <div data-page="exercises"></div>
      <div data-page="custom-workouts"></div>
      <div data-page="timers"></div>
      <div data-page="challenge"></div>
      <div data-page="progress"></div>
      <div data-page="habits"></div>
      <div data-page="recovery"></div>
      <div data-page="achievements"></div>
      <div data-page="settings"></div>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-btn active" data-nav="dashboard" aria-current="page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-nav="workouts">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="10" rx="2"/><line x1="12" y1="3" x2="12" y2="7"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <span>Workouts</span>
      </button>
      <button class="nav-btn" data-nav="challenge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        <span>Challenge</span>
      </button>
      <button class="nav-btn" data-nav="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
        <span>Progress</span>
      </button>
      <button class="nav-btn" data-nav="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </button>
    </nav>

    <div class="fullscreen-overlay" id="workout-player"></div>

    <div class="modal-overlay" id="modal-overlay" role="presentation" aria-hidden="true">
      <div class="modal" id="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title"></div>
    </div>
  </div>

  <script type="module" src="src/main.js?v=18"></script>
</body>
</html>
