<!DOCTYPE html>
<html lang="en">

  <style>
    :root {

    .mini-stat {

    .nav-item.active { color: white; background: rgba(96,165,250,0.15); }

    .pill {

    }
    .player-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; }

    .demo {

    .timer-display { font-size: 3rem; font-weight: 800; margin: 8px 0; letter-spacing: 1px; }
    .adjust-row, .player-actions { display: flex; gap: 10px; align-items: center; }
    .adjust-btn, .icon-btn {

    .set-dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255,255,255,0.16); }

    .ok { background: rgba(34,197,94,0.14); border-color: rgba(34,197,94,0.24); color: #bbf7d0; }

    .tag { display: inline-flex; padding: 6px 10px; border-radius: 999px; font-size: 0.76rem; background: rgba(255,255,255,0.06); color: var(--muted); }
    .spacer8 { height: 8px; }

      const mainCount = profile.time <= 15 ? 5 : profile.time <= 30 ? 8 : 11;
      const warm = pickUnique(pickPool(warmCats), profile.time <= 15 ? 2 : 3, seedValue + 10, used);
      warm.forEach(x => used.add(x.id));
      let mainExercises = [];
      if (profile.goal === 'Weight Loss') {
        const hiitPool = pickPool(['hiit']);
        const yogaPool = pickPool(['yoga', 'stretch']);
        const focusPool = pickPool(focusCats);
        mainExercises = [
          ...pickUnique(hiitPool, Math.max(2, Math.floor(mainCount / 3)), seedValue + 11, used),
          ...pickUnique(focusPool, Math.max(2, Math.floor(mainCount / 3)), seedValue + 12, used),
          ...pickUnique(yogaPool, mainCount, seedValue + 13, used)
        ];
      } else {
        const primaryPool = pickPool([...new Set([...goalCats, ...focusCats])]);
        const secondaryPool = pickPool(goalCats);
        mainExercises = [
          ...pickUnique(primaryPool, Math.ceil(mainCount * 0.7), seedValue + 14, used),
          ...pickUnique(secondaryPool, mainCount, seedValue + 15, used)
        ];
      }
      const deduped = [];
      const seen = new Set();
      for (const ex of mainExercises) {
        if (!ex || seen.has(ex.id) || used.has(ex.id) && !warm.some(w => w.id === ex.id)) continue;
        seen.add(ex.id);
        deduped.push(ex);
        used.add(ex.id);
        if (deduped.length >= mainCount) break;
      }
      while (deduped.length < mainCount) {
        const filler = pickUnique(pickPool(goalCats), 1, seedValue + 100 + deduped.length, used)[0];
        if (!filler) break;
        deduped.push(filler);
        used.add(filler.id);
      }
      const cool = pickUnique(pickPool(cooldownCats), 3, seedValue + 16, used);
      const routine = {
        title: `${profile.goal} • ${profile.focus}`,
        restDay: false,
        message: profile.goal === 'Weight Loss' ? 'Today mixes HIIT bursts with yoga recovery for better belly-fat focused conditioning.' : 'Balanced daily routine auto-shaped around your profile and available time.',
        warmup: warm.map(ex => convertExercise(ex, 'warmup', 0.9, 1)),
        main: deduped.map((ex, idx) => convertExercise(ex, 'main', 1 + (profile.time === 45 ? 0.08 : 0), idx < 2 && profile.goal === 'Flexibility' ? 1 : null)),
        cooldown: cool.map(ex => convertExercise(ex, 'cooldown', 0.85, 1))
      };
      routine.minutes = estimateRoutineMinutes(routine);
      return routine;
    }

    function computeConsistency() {
      const entries = Object.entries(state.days).map(([date, rec]) => ({ date, ...rec })).sort((a, b) => a.date.localeCompare(b.date));
      const completeDates = entries.filter(x => x.completed).map(x => x.date);
      let longest = 0;
      let current = 0;
      let run = 0;
      let prev = null;
      completeDates.forEach(date => {
        if (prev && dayCount(date) === dayCount(prev) + 1) run += 1;
        else run = 1;
        longest = Math.max(longest, run);
        prev = date;
      });
      const sortedDesc = [...completeDates].sort((a, b) => b.localeCompare(a));
      if (sortedDesc.length) {
        current = 1;
        let prevDate = sortedDesc[0];
        for (let i = 1; i < sortedDesc.length; i++) {
          if (dayCount(prevDate) - dayCount(sortedDesc[i]) === 1) {
            current += 1;
            prevDate = sortedDesc[i];
          } else break;
        }
        if (dayCount(todayKey()) - dayCount(sortedDesc[0]) > 1) current = 0;
      }
      return { current, longest };

    }
    function getRestSeconds() {
      const lvl = (state.profile?.level || 'Beginner').toLowerCase();
      return lvl === 'advanced' ? 10 : lvl === 'intermediate' ? 12 : 15;
    }
    function speak(text) {
      if (!state.settings.voice || !('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1;
      utter.pitch = 1;
      window.speechSynthesis.speak(utter);
    }
    function beep(duration = 140, freq = 880) {
      if (!state.settings.beep) return;
      try {
        ui.audioCtx = ui.audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const ctx = ui.audioCtx;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.value = 0.03;
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        setTimeout(() => osc.stop(), duration);
      } catch (e) {}
    }
    function playerCurrentItem() {
      return ui.player?.items?.[ui.player.index] || null;
    }
    function playerCurrentValue() {
      const item = playerCurrentItem();
      return ui.player.adjusted ?? item?.value ?? 0;
    }
    function startLeadIn() {
      const item = playerCurrentItem();
      const ex = byId(item.id);
      let count = 3;
      ui.player.status = 'countdown';
      ui.player.remaining = count;
      speak(`Get ready for ${ex.name}. 3, 2, 1, Begin!`);
      beep(100, 720);
      render();
      ui.leadHandle = setInterval(() => {
        count -= 1;
        if (count > 0) beep(100, 720 + count * 60);
        ui.player.remaining = count;
        render();
        if (count <= 0) {
          clearInterval(ui.leadHandle);
          ui.leadHandle = null;
          startActiveSet();
        }
      }, 1000);
    }
    function startActiveSet() {
      const item = playerCurrentItem();
      if (!item) return;
      const value = playerCurrentValue();
      ui.player.status = 'active';
      ui.player.paused = false;
      if (item.type === 'time') {
        ui.player.remaining = value;
        render();
        ui.timerHandle = setInterval(() => {
          if (ui.player.paused) return;
          ui.player.remaining -= 1;
          if (ui.player.remaining <= 3 && ui.player.remaining > 0) beep(100, 900);
          render();
          if (ui.player.remaining <= 0) {
            clearInterval(ui.timerHandle);
            ui.timerHandle = null;
            finishSet();
          }
        }, 1000);
      } else {
        render();
      }
    }
    function finishSet() {
      const item = playerCurrentItem();
      if (!item) return;
      clearTimers();
      if (ui.player.set < item.sets) {
        let rest = getRestSeconds();
        ui.player.status = 'rest';
        ui.player.remaining = rest;
        speak(`Rest for ${rest} seconds.`);
        render();
        ui.restHandle = setInterval(() => {
          rest -= 1;
          ui.player.remaining = rest;
          if (rest <= 3 && rest > 0) beep(100, 760);
          render();
          if (rest <= 0) {
            clearInterval(ui.restHandle);
            ui.restHandle = null;
            ui.player.set += 1;
            ui.player.adjusted = null;
            ui.player.status = 'preview';
            render();
          }
        }, 1000);
      } else {
        nextExercise();
      }
    }
    function nextExercise() {
      ui.player.index += 1;
      ui.player.set = 1;
      ui.player.adjusted = null;
      if (ui.player.index >= ui.player.items.length) {
        completeWorkout();
        return;
      }
      ui.player.status = 'preview';
      render();
    }
    function completeWorkout() {
      clearTimers();
      const today = ensureTodayRecord();
      today.completed = true;
      today.goals.warmup = true;
      today.goals.main = true;
      today.goals.cooldown = true;
      if (!today.statsApplied) {
        applyWorkoutStats(ui.player.routine || today.routine);
        today.statsApplied = true;
      }
      if (ui.player.source === 'challenge' && ui.player.challengeDay) {
        if (!state.challenge.startDate) state.challenge.startDate = todayKey();
        state.challenge.completedDays[ui.player.challengeDay] = todayKey();
      }
      const streaks = computeConsistency();
      if (streaks.current >= 3 && streaks.current % 3 === 0) {
        state.settings.lastSuggestionStreak = 0;
      }
      maybeUnlockBadges();
      saveState();
      ui.statusMessage = 'Workout completed. Great job!';
      ui.player = null;
      render();
    }
    function applyWorkoutStats(routine) {
      ['warmup', 'main', 'cooldown'].forEach(phase => {
        (routine[phase] || []).forEach(item => {
          const ex = byId(item.id);
          const total = item.value * item.sets;
          if (/plank/i.test(ex.name) && item.type === 'time') state.stats.totalPlankTime += total;
          if (/squat/i.test(ex.name) && item.type === 'reps') state.stats.totalSquats += total;
          if (['yoga', 'pranayama', 'stretch', 'office_break'].includes(ex.category)) {
            state.stats.totalYogaMinutes += item.type === 'time' ? total / 60 : total * 0.25;
          }
        });
      });
      state.stats.totalWorkouts += 1;
    }
    function renderPlayer() {
      if (!ui.player?.visible) return '';
      const item = playerCurrentItem();
      if (!item) return '';
      const ex = byId(item.id);
      const value = playerCurrentValue();
      const totalSets = item.sets;
      const setDots = Array.from({ length: totalSets }).map((_, i) => `<span class="set-dot ${i < ui.player.set ? 'active' : ''}"></span>`).join('');
      let display = '';
      if (ui.player.status === 'preview') display = `<div class="timer-display">${value}${item.type === 'time' ? 's' : ' reps'}</div><div class="muted">Adjust before starting if needed.</div>`;
      if (ui.player.status === 'countdown') display = `<div class="timer-display">${ui.player.remaining}</div><div class="muted">Get ready...</div>`;
      if (ui.player.status === 'active') display = `<div class="timer-display">${item.type === 'time' ? ui.player.remaining + 's' : value + ' reps'}</div><div class="muted">${item.type === 'time' ? 'Hold steady and breathe.' : 'Complete the target reps, then tap done.'}</div>`;
      if (ui.player.status === 'rest') display = `<div class="timer-display">${ui.player.remaining}s</div><div class="muted">Rest between sets</div>`;
      return `
        <div class="overlay">
          <div class="modal">
            <div class="player-head"><div><div class="subtle">${escapeHtml(ui.player.title)}</div><h2>${ex.emoji} ${escapeHtml(ex.name)}</h2><div class="subtle">${escapeHtml(ex.nameHindi || '')}</div></div><button class="icon-btn" data-action="close-player">✕</button></div>
            <div class="chip-row"><span class="chip">${escapeHtml(item.phase)}</span><span class="chip">${escapeHtml(ex.category)}</span><span class="chip">Set ${ui.player.set}/${totalSets}</span></div>
            <div class="exercise-stage"><div><div class="demo anim-${escapeHtml(ex.animation)}">${ex.emoji}</div>${display}</div></div>
            <div class="set-dots">${setDots}</div>
            <div class="spacer8"></div>
            <div class="adjust-row">
              <button class="adjust-btn" data-action="adjust-current" data-delta="-1">−</button>
              <div class="chip active">Target: ${value}${item.type === 'time' ? 's' : ' reps'}</div>
              <button class="adjust-btn" data-action="adjust-current" data-delta="1">+</button>
            </div>
            <div class="spacer8"></div>
            <div class="player-actions">
              ${ui.player.status === 'preview' ? `<button class="btn full" data-action="player-start">Start set</button>` : ''}
              ${ui.player.status === 'active' && item.type === 'reps' ? `<button class="btn green full" data-action="complete-set">Mark set done</button>` : ''}
              ${ui.player.status === 'active' && item.type === 'time' ? `<button class="btn secondary full" data-action="toggle-pause">${ui.player.paused ? 'Resume' : 'Pause'}</button>` : ''}
              ${ui.player.status === 'rest' ? `<button class="btn secondary full" data-action="skip-rest">Skip rest</button>` : ''}
              ${ui.player.status === 'countdown' ? `<button class="btn secondary full" data-action="skip-countdown">Skip countdown</button>` : ''}
            </div>
            <div class="spacer8"></div>
            <div class="two-col">
              <button class="btn secondary full" data-action="skip-exercise">Skip move</button>
              <button class="btn orange full" data-action="close-player">Finish later</button>
            </div>
            <div class="spacer8"></div>
            <div class="card" style="margin-bottom:0;">
              <h4>How to do it</h4>
              <p class="muted">${escapeHtml(ex.description)}</p>
              <ul>${ex.steps.map(step => `<li>${escapeHtml(step)}</li>`).join('')}</ul>
              <div class="tiny muted"><strong>Tips:</strong> ${escapeHtml(ex.tips.join(' • '))}</div>
              <div class="tiny muted"><strong>Breathing:</strong> ${escapeHtml(ex.breathing)}</div>
            </div>
          </div>
        </div>
      `;
    }
    function renderSection() {
      if (ui.section === 'home') return renderHome();
      if (ui.section === 'workouts') return renderWorkouts();
      if (ui.section === 'challenge') return renderChallenge();
      if (ui.section === 'progress') return renderProgress();
      return renderProfile();
    }
    function render() {
      ensureState();
      const root = document.getElementById('app-shell');
      root.innerHTML = `${renderSection()}${renderBottomNav()}${!state.profile ? renderOnboarding() : ''}${renderPlayer()}${ui.statusMessage ? `<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);max-width:420px;width:calc(100% - 32px);z-index:80" class="notice ok">${escapeHtml(ui.statusMessage)}</div>` : ''}`;
      setTimeout(() => { ui.statusMessage = ''; }, 2500);
    }
    function exportData() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `openfit-local-${todayKey()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }
    function importData(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!parsed || typeof parsed !== 'object') throw new Error('Invalid JSON');
          state = parsed;
          ensureState();
          saveState();
          ui.statusMessage = 'Data imported successfully.';
          render();
        } catch (err) {
          alert('Import failed. Please choose a valid OpenFit Local JSON file.');
        }
      };
      reader.readAsText(file);
    }
    function registerPWA() {
      if (!('serviceWorker' in navigator) || location.protocol === 'file:') return;
      const swCode = `
        const CACHE = 'openfit-local-static-v1';
        self.addEventListener('install', event => {
          event.waitUntil(caches.open(CACHE).then(cache => cache.addAll(['./', './index.html', './manifest.json'].filter(Boolean))).then(() => self.skipWaiting()));
        });
        self.addEventListener('activate', event => event.waitUntil(self.clients.claim()));
        self.addEventListener('fetch', event => {
          event.respondWith(caches.match(event.request).then(hit => hit || fetch(event.request).then(response => {
            const copy = response.clone();
            caches.open(CACHE).then(cache => cache.put(event.request, copy));
            return response;
          }).catch(() => caches.match('./index.html'))));
        });`;
      const blob = new Blob([swCode], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(() => {});
    }

    document.addEventListener('click', (e) => {
      const nav = e.target.closest('[data-nav]');
      if (nav) {
        ui.section = nav.dataset.nav;
        render();
        return;
      }
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const action = btn.dataset.action;
      if (action === 'pick-onboarding') {
        ui.onboardingAnswers[btn.dataset.key] = btn.dataset.value;
      } else if (action === 'onboarding-back') {
        ui.onboardingStep = Math.max(0, ui.onboardingStep - 1);
      } else if (action === 'onboarding-next') {
        const steps = onboardingChoices();
        const key = steps[ui.onboardingStep].key;
        if (!ui.onboardingAnswers[key]) return alert('Please choose an option to continue.');
        if (ui.onboardingStep < steps.length - 1) ui.onboardingStep += 1;
        else {
          state.profile = {
            goal: ui.onboardingAnswers.goal,
            focus: ui.onboardingAnswers.focus,
            time: Number(ui.onboardingAnswers.time),
            level: ui.onboardingAnswers.level,
          };
          state.settings.progressionBoost = state.settings.progressionBoost || 1;
          state.days[todayKey()] = null;
          ensureTodayRecord();
          saveState();
        }
      } else if (action === 'toggle-goal') {
        const day = ensureTodayRecord();
        const goal = btn.dataset.goal;
        day.goals[goal] = !day.goals[goal];
        saveState();
      } else if (action === 'save-custom-goal') {
        const day = ensureTodayRecord();
        const input = document.getElementById('customGoalInput');
        day.goals.customText = (input?.value || '').trim();
        if (!day.goals.customText) day.goals.customDone = false;
        saveState();
      } else if (action === 'set-water') {
        const day = ensureTodayRecord();
        day.water = Number(btn.dataset.count);
        saveState();
      } else if (action === 'start-today-workout') {
        const day = ensureTodayRecord();
        startRoutinePlayer(day.routine, { source: 'daily', title: 'Today\'s Routine' });
      } else if (action === 'start-plan') {
        const plan = PLANS.find(p => p.id === btn.dataset.plan);
        if (plan) startRoutinePlayer(buildPlanRoutine(plan), { source: 'plan', title: plan.name });
      } else if (action === 'start-challenge') {
        state.challenge.startDate = todayKey();
        saveState();
        ui.activeChallengeDay = 1;
        ui.section = 'challenge';
      } else if (action === 'focus-challenge-day') {
        ui.activeChallengeDay = Number(btn.dataset.day);
      } else if (action === 'start-challenge-day') {
        const day = CHALLENGE_DAYS.find(d => d.day === Number(btn.dataset.day));
        if (day) startRoutinePlayer(buildChallengeRoutine(day), { source: 'challenge', title: day.title, challengeDay: day.day });
      } else if (action === 'toggle-setting') {
        const key = btn.dataset.setting;
        state.settings[key] = !state.settings[key];
        saveState();
      } else if (action === 'apply-boost') {
        state.settings.progressionBoost = Number(((state.settings.progressionBoost || 1) * 1.1).toFixed(2));
        state.settings.lastSuggestionStreak = computeConsistency().current;
        state.days[todayKey()].routine = generateDailyRoutine(todayKey());
        saveState();
      } else if (action === 'reset-profile') {
        if (confirm('Reset your onboarding answers and regenerate routines?')) {
          state.profile = null;
          ui.onboardingStep = 0;
          ui.onboardingAnswers = {};
          saveState();
        }
      } else if (action === 'export-data') {
        exportData();
      } else if (action === 'import-data') {
        document.getElementById('importFile').click();
      } else if (action === 'adjust-current') {
        const item = playerCurrentItem();
        if (!ui.player || ui.player.status !== 'preview' || !item) return;
        const delta = Number(btn.dataset.delta);
        const step = item.type === 'time' ? 5 : 1;
        const min = item.type === 'time' ? 10 : 4;
        ui.player.adjusted = clamp((ui.player.adjusted ?? item.value) + delta * step, min, item.type === 'time' ? 300 : 100);
      } else if (action === 'player-start') {
        startLeadIn();
      } else if (action === 'complete-set') {
        finishSet();
      } else if (action === 'skip-exercise') {
        clearTimers();
        nextExercise();
      } else if (action === 'close-player') {
        clearTimers();
        ui.player = null;
      } else if (action === 'toggle-pause') {
        ui.player.paused = !ui.player.paused;
      } else if (action === 'skip-rest') {
        clearTimers();
        ui.player.set += 1;
        ui.player.status = 'preview';
      } else if (action === 'skip-countdown') {
        clearTimers();
        startActiveSet();
      }
      render();
    });

    document.getElementById('importFile').addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) importData(file);
      e.target.value = '';
    });

    window.addEventListener('beforeunload', clearTimers);

    state = loadState();
    ensureState();
    registerPWA();
    render();
  </script>
</body>
</html>
